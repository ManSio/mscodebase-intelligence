[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks integration tests
# Исключает случайное попадание в тесты папок с кешем или виртуальным окружением
norecursedirs = .git .venv venv .idea .vscode .codebase_index

# Позволяет pytest автоматически искать .env файлы (нужен плагин pytest-dotenv)
env_files =
    .env.test
